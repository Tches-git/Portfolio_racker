name: quality-gate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    name: Python tests and API contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pytest suite
        run: pytest -q

      - name: Run quality gate without LLM regression
        run: python main.py quality-gate --skip-regression

  frontend-checks:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck Next.js workspace
        run: npm run typecheck

  regression:
    name: Optional golden regression
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-checks]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'zhipu' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quality gate with golden regression
        run: |
          if [ -z "$ZHIPUAI_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "No LLM credentials configured; optional regression skipped."
            exit 0
          fi
          python main.py quality-gate --pytest-args -q
